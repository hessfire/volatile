<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>volatile (2026)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --accent: #00E5FF;
            --bg_dark: rgba(5, 5, 5, 0.85);
            --text_dim: #8f8f8f;
            --text_muted: #888888;
            --text_light: #ffffff;
            --tier_s: #ff2a6d;
            --tier_a: #ff7a00;
            --tier_b: #e5df00;
            --tier_c: #05d59e;
            --tier_d: #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #000; color: var(--text_light); overflow: hidden; height: 100vh; }

        #bg_image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            min-width: 100vw; min-height: 100vh;
            object-fit: cover; filter: blur(40px) scale(1.2); z-index: -2;
            opacity: 0.8;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            min-width: 100vw; min-height: 100vh;
            background: linear-gradient(100deg, var(--bg_dark) 0%, rgba(10,10,10,0.6) 50%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        #player_ui { width: 100vw; height: 100vh; display: flex; }

        .sidebar {
            flex: 1;
            height: 100%;
            padding: 100px 40px 100px 20px;
            display: flex; flex-direction: column;
            overflow-y: auto;
            -ms-overflow-style: none; scrollbar-width: none;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        .sidebar::-webkit-scrollbar { display: none; }

        .tracklist { list-style: none; display: flex; flex-direction: column; gap: 2px; padding: 10px 0 40vh 0; }
        .volume_header {
            color: var(--accent); font-size: 0.8rem; letter-spacing: 4px;
            margin: 42px 0 12px 14px; font-weight: 900; opacity: 0.9;
            display: flex; align-items: center; gap: 14px;
            text-shadow: 0 0 14px rgba(0, 229, 255, 0.45);
        }
        .volume_header::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.45), rgba(0, 229, 255, 0.02) 70%, transparent);
        }

        .track {
            position: relative;
            color: var(--text_dim); cursor: pointer;
            transition: color 0.35s ease, transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), background 0.35s ease;
            padding: 12px 14px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            overflow: visible;
        }
        .track:hover {
            color: var(--text_light);
            background: linear-gradient(90deg, rgba(0,229,255,0.09) 0%, rgba(0,229,255,0.015) 55%, transparent 100%);
            transform: translateX(6px);
        }
        .track:hover .track_num { color: var(--accent); opacity: 1; }

        .track_info { display: flex; align-items: center; flex: 1; min-width: 0; overflow: visible; }

        .track_title {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; font-size: 1.1rem;
            transition: font-size 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
        }

        .track.active {
            background: linear-gradient(90deg, rgba(0,229,255,0.13) 0%, rgba(0,229,255,0.03) 55%, transparent 100%);
        }
        .track.active .track_info { color: var(--text_light); transform: translateX(8px); }
        .track.active .track_title {
            font-size: 1.75rem; font-weight: 800; letter-spacing: -0.4px;
            background: linear-gradient(95deg, #ffffff 30%, var(--accent));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5));
            overflow: visible; padding-right: 50px;
        }
        .track.active .track_num {
            color: var(--accent); font-size: 1.15rem; font-weight: 700; opacity: 1;
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
        }
        .track_num { display: inline-block; width: 2.5rem; text-align: right; margin-right: 18px; font-weight: 300; opacity: 0.7; flex-shrink: 0; font-variant-numeric: tabular-nums; transition: all 0.4s; }

        .tier_selector {
            display: flex; gap: 5px; opacity: 0; transform: translateX(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            margin-left: 24px; flex-shrink: 0; background: rgba(0,0,0,0.35);
            padding: 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
        }
        .track:hover .tier_selector, .tier_selector.has_selection { opacity: 1; transform: translateX(0); }
        .t_btn {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text_muted); width: 28px; height: 28px; border-radius: 7px; font-size: 12px; font-weight: 900;
            cursor: pointer; transition: all 0.18s ease; display: flex; justify-content: center; align-items: center;
        }
        .t_btn[data-tier="S"] { color: var(--tier_s); }
        .t_btn[data-tier="A"] { color: var(--tier_a); }
        .t_btn[data-tier="B"] { color: var(--tier_b); }
        .t_btn[data-tier="C"] { color: var(--tier_c); }
        .t_btn[data-tier="D"] { color: var(--tier_d); }
        .t_btn[data-tier="S"]:hover { background: var(--tier_s); border-color: var(--tier_s); color: #000; transform: translateY(-2px); }
        .t_btn[data-tier="A"]:hover { background: var(--tier_a); border-color: var(--tier_a); color: #000; transform: translateY(-2px); }
        .t_btn[data-tier="B"]:hover { background: var(--tier_b); border-color: var(--tier_b); color: #000; transform: translateY(-2px); }
        .t_btn[data-tier="C"]:hover { background: var(--tier_c); border-color: var(--tier_c); color: #000; transform: translateY(-2px); }
        .t_btn[data-tier="D"]:hover { background: var(--tier_d); border-color: var(--tier_d); color: #000; transform: translateY(-2px); }
        .t_btn.active[data-tier="S"] { background: var(--tier_s); border-color: var(--tier_s); color: #000; box-shadow: 0 0 12px var(--tier_s); }
        .t_btn.active[data-tier="A"] { background: var(--tier_a); border-color: var(--tier_a); color: #000; box-shadow: 0 0 12px var(--tier_a); }
        .t_btn.active[data-tier="B"] { background: var(--tier_b); border-color: var(--tier_b); color: #000; box-shadow: 0 0 12px var(--tier_b); }
        .t_btn.active[data-tier="C"] { background: var(--tier_c); border-color: var(--tier_c); color: #000; box-shadow: 0 0 12px var(--tier_c); }
        .t_btn.active[data-tier="D"] { background: var(--tier_d); border-color: var(--tier_d); color: #000; box-shadow: 0 0 12px var(--tier_d); }
        .tier_selector.has_selection .t_btn:not(.active) { opacity: 0.4; }
        .tier_selector.has_selection:hover .t_btn:not(.active) { opacity: 1; }

        .track_actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .dl_btn {
            opacity: 0; flex-shrink: 0;
            width: 30px; height: 30px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text_dim); font-size: 15px; line-height: 1; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.3s, background 0.2s, color 0.2s, transform 0.2s;
        }
        .track:hover .dl_btn { opacity: 1; }
        .dl_btn:hover { background: var(--accent); border-color: var(--accent); color: #000; transform: translateY(-1px); }

        .album_header {
            display: flex; align-items: center; gap: 18px; margin-bottom: 18px; flex-shrink: 0;
        }
        .album_cover {
            width: 64px; height: 64px; border-radius: 14px; object-fit: cover; flex-shrink: 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.08);
        }
        .album_meta { flex: 1; min-width: 0; }
        .album_title { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
        .album_sub { color: var(--text_muted); font-size: 0.85rem; margin-top: 6px; letter-spacing: 0.5px; }
        .dl_all_btn {
            display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
            width: 52px; height: 52px; border-radius: 14px;
            background: rgba(0, 229, 255, 0.08); border: 1px solid rgba(0, 229, 255, 0.35);
            color: var(--accent); font-weight: 700;
            backdrop-filter: blur(15px); transition: all 0.25s ease;
        }
        .dl_all_btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px rgba(0,229,255,0.4); transform: translateY(-1px); }
        .dl_all_btn svg { width: 22px; height: 22px; }
        .dl_all_btn.busy { opacity: 0.6; pointer-events: none; }
        .dl_all_btn.has_label { width: auto; padding: 0 20px; gap: 10px; font-size: 0.95rem; }
        .dl_all_btn.has_label span { white-space: nowrap; }

        .dl_player_btn {
            display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
            height: 60px; width: 60px; border: none;
            color: var(--accent); font-weight: 700; font-family: inherit;
            transition: all 0.25s ease;
        }
        .dl_player_btn svg { width: 20px; height: 20px; }
        .dl_player_btn span { white-space: nowrap; }
        .dl_player_btn:hover { color: #000; background: var(--accent); box-shadow: 0 0 25px rgba(0,229,255,0.4); }
        .dl_player_btn.busy { opacity: 0.6; pointer-events: none; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 150%);
            width: min(440px, 90vw); padding: 16px 20px; border-radius: 16px;
            background: rgba(15,15,15,0.9); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 100; transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2); opacity: 0;
        }
        .toast.visible { transform: translate(-50%, 0); opacity: 1; }
        .toast_label { font-size: 0.85rem; color: var(--text_light); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toast_bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .toast_fill { height: 100%; width: 0%; border-radius: 3px; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s ease; }

        .main_content { flex: 0 0 900px; display: flex; flex-direction: column; padding: 40px 60px 40px 0; height: 100%; }
        .top_window {
            height: fit-content; max-height: 50vh; width: 100%;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px; backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex; flex-direction: column; padding: 15px; gap: 8px; overflow-y: auto;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .top_window::-webkit-scrollbar { display: none; }
        .spacer { flex: 1; }
        .tier_row { display: grid; grid-template-columns: 40px 1fr; grid-template-rows: auto; width: 100%; min-height: 34px; flex-shrink: 0; background: rgba(0, 0, 0, 0.3); border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.03); overflow: visible; }
        .tier_label { display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: #000; border-radius: 7px 0 0 7px; }
        .tier_label.s { background-color: var(--tier_s); }
        .tier_label.a { background-color: var(--tier_a); }
        .tier_label.b { background-color: var(--tier_b); }
        .tier_label.c { background-color: var(--tier_c); }
        .tier_label.d { background-color: var(--tier_d); }
        .tier_content { display: flex; flex-wrap: wrap; padding: 6px 12px; gap: 6px; align-items: flex-start; align-content: flex-start; min-height: min-content; }
        .tier_item { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text_light); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .tier_item span { opacity: 0.4; margin-right: 4px; }

        .bottom_player { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        #visualizer { width: 100%; height: 320px; }

        .timeline_container { width: 100%; display: flex; align-items: center; gap: 15px; margin-top: 15px; color: var(--text_muted); font-size: 0.9rem; font-variant-numeric: tabular-nums; }
        .time_display { width: 45px; }
        #current_time { text-align: right; }
        #total_time { text-align: left; }
        #waveform { flex: 1; height: 46px; display: block; cursor: pointer; border-radius: 6px; }

        .controls_wrapper { margin-top: 25px; display: flex; flex-direction: row; align-items: center; gap: 20px; }
        .glass_pill { display: flex; align-items: center; height: 60px; background: rgba(255, 255, 255, 0.03); border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); }
        .controls { gap: 25px; padding: 0 30px; }
        .ctrl_btn { background: transparent; border: none; color: var(--text_muted); font-size: 22px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .ctrl_btn:hover { color: var(--accent); transform: scale(1.1); }
        .play_btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); color: #000; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .play_btn:hover { color: #000; }

        .volume_container { padding: 0 30px; }

        input[type="range"] { -webkit-appearance: none; height: 6px; background: var(--text_dim); border-radius: 3px; outline: none; cursor: pointer; }
        #volume_slider { width: 110px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid var(--accent); }

        #loading_overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #loading_overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading_content { text-align: center; }
        .loading_text { color: var(--text_muted); font-size: 1rem; letter-spacing: 1px; margin-bottom: 12px; }
        .loading_progress { color: var(--accent); font-size: 2rem; font-weight: 700; }
        #player_ui.loading { filter: blur(10px); pointer-events: none; }

        @media (max-width: 900px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            #player_ui { flex-direction: column; height: auto; min-height: 100vh; }

            .main_content {
                flex: none; width: 100%; order: 1; height: auto;
                padding: 20px 15px 0 15px;
            }
            .album_header { flex-wrap: wrap; gap: 12px; }
            .album_cover { width: 50px; height: 50px; border-radius: 10px; }
            .album_title { font-size: 1.4rem; }
            .album_sub { font-size: 0.75rem; }
            .dl_all_btn { width: 42px; height: 42px; }
            .dl_all_btn svg { width: 18px; height: 18px; }
            .dl_all_btn.has_label { height: 42px; padding: 0 14px; font-size: 0.8rem; }
            .dl_player_btn { height: 50px; width: 50px; }

            .top_window { max-height: none; padding: 10px; gap: 6px; border-radius: 16px; overflow: visible; height: auto; flex-shrink: 0; }
            .tier_row { min-height: 28px; grid-template-columns: 30px 1fr; height: auto; }
            .tier_label { font-size: 0.9rem; }
            .tier_content { padding: 4px 8px; gap: 4px; }
            .tier_item { font-size: 0.7rem; padding: 3px 6px; }

            .sidebar {
                order: 2; flex: none; height: auto;
                padding: 20px 10px 180px 10px;
                mask-image: none; -webkit-mask-image: none;
                overflow: visible;
            }
            .tracklist { padding: 10px 0; }
            .volume_header { margin: 20px 0 8px 10px; font-size: 0.7rem; letter-spacing: 3px; }
            .track { padding: 10px 8px; border-radius: 8px; }
            .track_num { width: 2rem; margin-right: 10px; font-size: 0.9rem; }
            .track_title { font-size: 0.95rem; max-width: calc(100vw - 200px); }
            .track.active .track_title { font-size: 1.1rem; padding-right: 0; max-width: calc(100vw - 200px); overflow: hidden; text-overflow: ellipsis; }
            .track.active .track_num { font-size: 1rem; }
            .tier_selector {
                opacity: 1; transform: none;
                margin-left: auto; padding: 3px; gap: 3px;
            }
            .t_btn { width: 24px; height: 24px; font-size: 10px; border-radius: 5px; }
            .dl_btn { display: none; }

            .bottom_player {
                order: 3;
                position: fixed; bottom: 0; left: 0; right: 0;
                background: rgba(10, 10, 10, 0.95);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255,255,255,0.08);
                padding: 10px 15px calc(env(safe-area-inset-bottom, 0px) + 15px) 15px;
                z-index: 50;
            }
            #visualizer { display: none; }
            .timeline_container { margin-top: 0; gap: 10px; font-size: 0.8rem; }
            .time_display { width: 38px; }
            #waveform { height: 36px; }
            .controls_wrapper { margin-top: 12px; gap: 12px; }
            .glass_pill { height: 50px; }
            .controls { gap: 20px; padding: 0 20px; }
            .ctrl_btn { font-size: 18px; }
            .play_btn { width: 38px; height: 38px; font-size: 16px; }
            .volume_container { padding: 0 15px; }
            #volume_slider { width: 80px; }

            .spacer { display: none; }
        }

        @media (max-width: 480px) {
            .album_header { gap: 10px; }
            .album_cover { width: 44px; height: 44px; }
            .album_title { font-size: 1.2rem; }
            .dl_all_btn { width: 38px; height: 38px; }
            .top_window { max-height: none; }
            .volume_container { display: none; }
        }
    </style>
</head>
<body>

    <img id="bg_image" src="cover.jpg" alt="Album Cover" onerror="this.src='https://via.placeholder.com/1000/111/333?text=Cover+Art+Not+Found'">
    <div class="overlay"></div>

    <div id="loading_overlay">
        <div class="loading_content">
            <div class="loading_text">please wait, precaching songs...</div>
            <div class="loading_progress" id="loading_progress">0/35</div>
        </div>
    </div>

    <div id="player_ui">
        <div class="sidebar" id="sidebar">
            <ul class="tracklist" id="tracklist_container"></ul>
        </div>

        <div class="main_content">
            <div class="album_header">
                <img class="album_cover" src="cover.jpg" alt="Cover" onerror="this.style.display='none'">
                <div class="album_meta">
                    <h1 class="album_title">volatile</h1>
                    <p class="album_sub">20 months of work, made with &lt;3 by hessfire</p>
                </div>
                <button class="dl_all_btn has_label" id="export_tier_btn" title="Export tier list as an image">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    <span>export tierlist</span>
                </button>
            </div>
            <div class="top_window" id="module_window">
                <div class="tier_row"><div class="tier_label s">S</div><div class="tier_content" id="tier_s"></div></div>
                <div class="tier_row"><div class="tier_label a">A</div><div class="tier_content" id="tier_a"></div></div>
                <div class="tier_row"><div class="tier_label b">B</div><div class="tier_content" id="tier_b"></div></div>
                <div class="tier_row"><div class="tier_label c">C</div><div class="tier_content" id="tier_c"></div></div>
                <div class="tier_row"><div class="tier_label d">D</div><div class="tier_content" id="tier_d"></div></div>
            </div>
            <div class="spacer"></div>
            <div class="bottom_player">
                <canvas id="visualizer"></canvas>
                <div class="timeline_container">
                    <span class="time_display" id="current_time">0:00</span>
                    <canvas id="waveform" title="Click or drag to seek"></canvas>
                    <span class="time_display" id="total_time">0:00</span>
                </div>
                <div class="controls_wrapper">
                    <div class="glass_pill controls">
                        <button class="ctrl_btn" id="prev_btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
                        </button>
                        <button class="ctrl_btn play_btn" id="play_pause_btn">
                            <svg class="play_icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="pause_icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button class="ctrl_btn" id="next_btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                    </div>
                    <div class="glass_pill volume_container">
                        <input type="range" id="volume_slider" min="0" max="1" step="0.01" value="0.10">
                    </div>
                    <button class="glass_pill dl_player_btn" id="dl_all_btn" title="Download every track as a .zip">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio_player"></audio>

    <div class="toast" id="dl_toast">
        <div class="toast_label" id="toast_label">Preparing download...</div>
        <div class="toast_bar"><div class="toast_fill" id="toast_fill"></div></div>

        function display_title(t) {
            return t.feat ? `${t.title} ${t.feat.map(f => '+' + f).join(' ')}` : t.title;
        }

        function sanitize_name(name) {
            return name.replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, ' ').trim();
        }

        function file_name_for(t) {
            const artists = ['hessfire', ...(t.feat || [])].join(', ');
            return sanitize_name(`${artists} - ${t.title}`) + '.wav';

        const tracklist_container = document.getElementById('tracklist_container');
        const audio_player = document.getElementById('audio_player');
        const play_pause_btn = document.getElementById('play_pause_btn');
        const prev_btn = document.getElementById('prev_btn');

        const wave_ctx = wave_canvas.getContext('2d');

        let current_track_index = 0;
        let is_playing = false;
        let track_elements = [];
        let audio_context, analyser, source;
        let audio_initialized = false;
        let is_scrubbing = false;
        let current_peaks = null;
        let wave_token = 0;
        let decode_ctx = null;

        audio_player.volume = 0.10;

        function init_tracklist() {
            let current_volume = "";
            album_data.forEach((track, index) => {
                if (track.vol !== current_volume) {

                    header.classList.add('volume_header');

                    tracklist_container.appendChild(header);
                }
                const li = document.createElement('li');
                li.classList.add('track');
                const info_div = document.createElement('div');
                info_div.classList.add('track_info');
                info_div.innerHTML = `<span class="track_num">${track.id}.</span><span class="track_title">${display_title(track)}</span>`;
                const actions_div = document.createElement('div');
                actions_div.classList.add('track_actions');
                const tier_div = document.createElement('div');
                tier_div.classList.add('tier_selector');
                ['S', 'A', 'B', 'C', 'D'].forEach(tier_name => {
                    const btn = document.createElement('button');
                    btn.classList.add('t_btn');
                    btn.dataset.tier = tier_name;
                    btn.textContent = tier_name;
                    btn.addEventListener('click', (e) => { e.stopPropagation(); handle_tier_change(index, tier_name); });
                    tier_div.appendChild(btn);
                });
                const dl_btn = document.createElement('button');
                dl_btn.classList.add('dl_btn');
                dl_btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>';
                dl_btn.title = `Download "${file_name_for(track)}"`;
                dl_btn.addEventListener('click', (e) => { e.stopPropagation(); download_track(index); });
                actions_div.appendChild(tier_div);
                actions_div.appendChild(dl_btn);
                li.appendChild(info_div);
                li.appendChild(actions_div);
                li.addEventListener('click', () => { if (!audio_initialized) setup_web_audio(); load_and_play_track(index); });
                tracklist_container.appendChild(li);
                track_elements.push({ li, tier_div });
            });
            load_track(0, true); update_volume_ui(); resize_waveform(); draw_waveform();
        }

        function handle_tier_change(track_index, new_tier) {
            const track = album_data[track_index];
            track.tier = (track.tier === new_tier) ? null : new_tier;
            const { tier_div } = track_elements[track_index];
            tier_div.querySelectorAll('.t_btn').forEach(btn => btn.classList.remove('active'));
            tier_div.classList.remove('has_selection');
            if (track.tier) {
                tier_div.querySelector(`[data-tier="${track.tier}"]`).classList.add('active');
                tier_div.classList.add('has_selection');
            }
            render_tier_module();
        }

        function render_tier_module() {
            ['s', 'a', 'b', 'c', 'd'].forEach(t => document.getElementById(`tier_${t}`).innerHTML = '');
            album_data.forEach((track, index) => {
                if (track.tier) {
                    const pill = document.createElement('div');
                    pill.classList.add('tier_item');
                    pill.innerHTML = `<span>${track.id}.</span> ${display_title(track)}`;
                    pill.addEventListener('click', () => { if (!audio_initialized) setup_web_audio(); load_and_play_track(index); });
                    document.getElementById(`tier_${track.tier.toLowerCase()}`).appendChild(pill);
                }
            });
        }

        function load_track(index, skip_scroll) {
            current_track_index = index;
            const track_id = album_data[index].id;
            audio_player.src = audio_cache.has(track_id) ? audio_cache.get(track_id) : `audio/${track_id}.wav`;
            track_elements.forEach(el => el.li.classList.remove('active'));
            const active_el = track_elements[index].li;
            active_el.classList.add('active');
            if (!skip_scroll) active_el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            load_waveform(album_data[index]);
        }

        function update_play_pause_icon(playing) {
            play_pause_btn.querySelector('.play_icon').style.display = playing ? 'none' : 'block';
            play_pause_btn.querySelector('.pause_icon').style.display = playing ? 'block' : 'none';
        }

        function load_and_play_track(index) {
            load_track(index);
            audio_player.play().then(() => { is_playing = true; update_play_pause_icon(true); });
            if (audio_context?.state === 'suspended') audio_context.resume();
        }

        function toggle_play() {
            if (!audio_initialized) setup_web_audio();
            if (audio_context?.state === 'suspended') audio_context.resume();
            if (audio_player.paused) audio_player.play(); else audio_player.pause();
        }
        play_pause_btn.addEventListener('click', toggle_play);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                if (e.target instanceof HTMLElement) e.target.blur();
                toggle_play();
            }
        });

        prev_btn.addEventListener('click', () => load_and_play_track((current_track_index - 1 < 0) ? album_data.length - 1 : current_track_index - 1));
        next_btn.addEventListener('click', play_next);
        audio_player.addEventListener('ended', play_next);
        function play_next() { load_and_play_track((current_track_index + 1) % album_data.length); }

        audio_player.addEventListener('play',  () => { is_playing = true;  update_play_pause_icon(true); document.body.classList.add('playing'); });
        audio_player.addEventListener('pause', () => { is_playing = false; update_play_pause_icon(false); document.body.classList.remove('playing'); });

        function update_volume_ui() {
            const val = volume_slider.value;
            volume_slider.style.background = `linear-gradient(to right, var(--accent) ${val*100}%, var(--text_dim) ${val*100}%)`;
        }
        volume_slider.addEventListener('input', (e) => { audio_player.volume = e.target.value; update_volume_ui(); });

        function format_time(s) { if (isNaN(s)) return "0:00"; const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        audio_player.addEventListener('loadedmetadata', () => { total_time_el.textContent = format_time(audio_player.duration); draw_waveform(); });
        audio_player.addEventListener('timeupdate', () => { if (!is_scrubbing) { current_time_el.textContent = format_time(audio_player.currentTime); draw_waveform(); } });

        const wave_bars = 180;

        function compute_peaks(audio_buffer, count) {
            const ch = audio_buffer.getChannelData(0);
            const block = Math.max(1, Math.floor(ch.length / count));
            const peaks = new Float32Array(count);
            let max = 0;
            for (let i = 0; i < count; i++) {
                let peak = 0;
                const start = i * block;
                for (let j = 0; j < block && start + j < ch.length; j++) {
                    const v = Math.abs(ch[start + j]);
                    if (v > peak) peak = v;
                }
                peaks[i] = peak; if (peak > max) max = peak;
            }
            if (max > 0) for (let i = 0; i < count; i++) peaks[i] /= max;
            return peaks;
        }

        function synth_peaks(seed, count) {
            const peaks = new Float32Array(count);
            let s = (seed * 9301 + 49297) % 233280;
            for (let i = 0; i < count; i++) {
                s = (s * 9301 + 49297) % 233280;
                const r = s / 233280;
                const env = 0.35 + 0.65 * Math.abs(Math.sin((i / count) * Math.PI * 4));
                peaks[i] = Math.max(0.08, env * (0.45 + 0.55 * r));
            }
            return peaks;
        }

        async function load_waveform(track) {
            const token = ++wave_token;
            current_peaks = null; draw_waveform();
            try {
                const resp = await fetch(`audio/${track.id}.wav`);
                if (!resp.ok) throw new Error('fetch');
                const buf = await resp.arrayBuffer();
                decode_ctx = decode_ctx || new (window.AudioContext || window.webkitAudioContext)();
                const audio_buf = await decode_ctx.decodeAudioData(buf);
                if (token !== wave_token) return;
                current_peaks = compute_peaks(audio_buf, wave_bars);
            } catch (e) {
                if (token !== wave_token) return;
                current_peaks = synth_peaks(track.id, wave_bars);
            }
            draw_waveform();
        }

        function resize_waveform() {
            const dpr = window.devicePixelRatio || 1;
            wave_canvas._w = wave_canvas.offsetWidth;
            wave_canvas._h = wave_canvas.offsetHeight;
            wave_canvas.width = Math.round(wave_canvas._w * dpr);
            wave_canvas.height = Math.round(wave_canvas._h * dpr);
            wave_ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', () => { resize_waveform(); draw_waveform(); });

        function draw_waveform() {
            const w = wave_canvas._w || wave_canvas.offsetWidth;
            const h = wave_canvas._h || wave_canvas.offsetHeight;
            wave_ctx.clearRect(0, 0, w, h);
            const peaks = current_peaks;
            const progress = audio_player.duration ? audio_player.currentTime / audio_player.duration : 0;
            const n = peaks ? peaks.length : wave_bars;
            const slot = w / n;
            const bw = Math.max(1.5, slot * 0.62);
            const mid = h / 2;
            for (let i = 0; i < n; i++) {
                const amp = peaks ? peaks[i] : 0.06;
                const bar_h = Math.max(2, amp * (h - 2));
                const x = i * slot + (slot - bw) / 2;
                const played = (i + 0.5) / n <= progress;
                wave_ctx.fillStyle = played ? '#00E5FF' : 'rgba(255,255,255,0.18)';
                if (played) { wave_ctx.shadowBlur = 6; wave_ctx.shadowColor = 'rgba(0,229,255,0.5)'; }
                else { wave_ctx.shadowBlur = 0; }
                wave_ctx.beginPath();
                wave_ctx.roundRect(x, mid - bar_h / 2, bw, bar_h, bw / 2);
                wave_ctx.fill();
            }
            wave_ctx.shadowBlur = 0;
        }

        function seek_from_event(e) {
            const rect = wave_canvas.getBoundingClientRect();
            const client_x = e.touches ? e.touches[0].clientX : e.clientX;
            const ratio = Math.min(1, Math.max(0, (client_x - rect.left) / rect.width));
            if (audio_player.duration) {
                audio_player.currentTime = ratio * audio_player.duration;
                current_time_el.textContent = format_time(audio_player.currentTime);
            }
            draw_waveform();
        }
        wave_canvas.addEventListener('mousedown', (e) => { is_scrubbing = true; seek_from_event(e); });
        window.addEventListener('mousemove', (e) => { if (is_scrubbing) seek_from_event(e); });
        window.addEventListener('mouseup', () => { is_scrubbing = false; });
        wave_canvas.addEventListener('touchstart', (e) => { is_scrubbing = true; seek_from_event(e); e.preventDefault(); }, { passive: false });
        wave_canvas.addEventListener('touchmove', (e) => { if (is_scrubbing) { seek_from_event(e); e.preventDefault(); } }, { passive: false });
        window.addEventListener('touchend', () => { is_scrubbing = false; });

        function setup_web_audio() {
            audio_initialized = true;
            audio_context = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audio_context.createAnalyser();
            source = audio_context.createMediaElementSource(audio_player);
            source.connect(analyser); analyser.connect(audio_context.destination);
            analyser.fftSize = 16384;
            analyser.smoothingTimeConstant = 0.65;
            const bins = analyser.frequencyBinCount;
            const data_array = new Uint8Array(bins);

            const points = 512;
            const smoothed = new Float32Array(points);
            const raw_levels = new Float32Array(points);

            let css_w = 0, css_h = 0;
            function resize() {
                const dpr = window.devicePixelRatio || 1;
                css_w = canvas.offsetWidth; css_h = canvas.offsetHeight;
                canvas.width = Math.round(css_w * dpr); canvas.height = Math.round(css_h * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            resize(); window.addEventListener('resize', resize);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data_array);
                ctx.clearRect(0, 0, css_w, css_h);

                const line_y = css_h * 0.75;
                const max_amp = css_h * 0.7;
                const usable_bins = Math.floor(bins * 0.5);
                const min_y = 15;

                let total_level = 0;
                let max_raw = 0;
                for (let i = 0; i < points; i++) {
                    const t = i / points;
                    const bin_idx = Math.floor(Math.pow(t, 2.2) * usable_bins);
                    const next_bin_idx = Math.floor(Math.pow((i + 1) / points, 2.2) * usable_bins);
                    let sum = 0, count = 0;
                    for (let j = bin_idx; j < next_bin_idx && j < bins; j++) {
                        sum += data_array[j];
                        count++;
                    }
                    const raw = count > 0 ? (sum / count) / 255 : data_array[bin_idx] / 255;
                    raw_levels[i] = raw;
                    total_level += raw;
                    if (raw > max_raw) max_raw = raw;
                }
                const avg_level = total_level / points;
                const scale = max_raw > 0.01 ? Math.min(1, (line_y - min_y) / (Math.pow(max_raw, 0.7) * max_amp * 1.4)) : 1;

                for (let i = 0; i < points; i++) {
                    const target = Math.pow(raw_levels[i], 0.7) * max_amp * 1.4 * scale;
                    smoothed[i] += (target - smoothed[i]) * 0.5;
                }

                const path_points = [];
                for (let i = 0; i < points; i++) {
                    const x = (i / (points - 1)) * css_w;
                    const y = line_y - smoothed[i];
                    const relative_hot = (raw_levels[i] - avg_level - 0.1) / 0.4;
                    const absolute_hot = (raw_levels[i] - 0.7) / 0.3;
                    const hotness = Math.min(1, Math.max(0, Math.max(relative_hot, absolute_hot)));
                    path_points.push({ x, y, hotness, amp: smoothed[i] });
                }

                ctx.beginPath();
                ctx.moveTo(0, css_h);
                path_points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.lineTo(css_w, css_h);
                ctx.closePath();
                const fill_grad = ctx.createLinearGradient(0, line_y - max_amp, 0, css_h);
                fill_grad.addColorStop(0, 'rgba(180, 200, 220, 0.25)');
                fill_grad.addColorStop(0.4, 'rgba(180, 200, 220, 0.12)');
                fill_grad.addColorStop(1, 'rgba(180, 200, 220, 0.02)');
                ctx.fillStyle = fill_grad;
                ctx.fill();

                for (let i = 1; i < path_points.length; i++) {
                    const p0 = path_points[i - 1];
                    const p1 = path_points[i];
                    const hot = Math.max(p0.hotness, p1.hotness);
                    const r = Math.round(210 + 45 * hot);
                    const g = Math.round(220 - 120 * hot);
                    const b = Math.round(235 - 155 * hot);
                    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.9)`;
                    ctx.lineWidth = 1.2 + hot * 0.8;
                    ctx.shadowBlur = 4 + hot * 12;
                    ctx.shadowColor = hot > 0.3 ? `rgba(255, 80, 80, ${0.3 + hot * 0.5})` : 'rgba(180, 210, 255, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(p0.x, p0.y);
                    ctx.lineTo(p1.x, p1.y);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, line_y);
                ctx.lineTo(css_w, line_y);
                ctx.stroke();
            }
            draw();
        }

        const dl_toast = document.getElementById('dl_toast');
        const toast_label = document.getElementById('toast_label');
        const toast_fill = document.getElementById('toast_fill');
        const dl_all_btn = document.getElementById('dl_all_btn');
        let zipping = false;

        function trigger_download(href, filename, revoke) {
            const a = document.createElement('a');
            a.href = href; a.download = filename;
            document.body.appendChild(a); a.click(); a.remove();
            if (revoke) setTimeout(() => URL.revokeObjectURL(href), 1000);
        }

        function download_track(index) {
            const t = album_data[index];
            trigger_download(`audio/${t.id}.wav`, file_name_for(t), false);
        }

        function show_toast(label, pct) {
            dl_toast.classList.add('visible');
            toast_label.textContent = label;
            toast_fill.style.width = `${pct}%`;
        }
        function hide_toast() { dl_toast.classList.remove('visible'); }

        async function download_all() {
            if (zipping) return;
            if (typeof JSZip === 'undefined') {
                show_toast('Couldn\'t load the zip library (no connection?)', 100);
                setTimeout(hide_toast, 4000);
                return;
            }
            zipping = true;
            dl_all_btn.classList.add('busy');
            const zip = new JSZip();
            try {
                for (let i = 0; i < album_data.length; i++) {
                    const t = album_data[i];
                    show_toast(`Fetching ${i + 1}/${album_data.length} - ${t.title}`, (i / album_data.length) * 90);
                    const resp = await fetch(`audio/${t.id}.wav`);
                    if (!resp.ok) throw new Error(`${t.id}.wav (${resp.status})`);
                    zip.file(file_name_for(t), await resp.blob());
                }
                const blob = await zip.generateAsync(
                    { type: 'blob', compression: 'STORE' },
                    (meta) => show_toast(`Packing zip... ${Math.round(meta.percent)}%`, 90 + meta.percent * 0.1)
                );
                trigger_download(URL.createObjectURL(blob), 'hessfire - volatile.zip', true);
                show_toast('Done - saving zip', 100);
                setTimeout(hide_toast, 2500);
            } catch (err) {
                show_toast(`Download failed: ${err.message}. Serve the site over http (not file://).`, 100);
                setTimeout(hide_toast, 6000);
            } finally {
                zipping = false;
                dl_all_btn.classList.remove('busy');
            }
        }
        dl_all_btn.addEventListener('click', download_all);

        const audio_cache = new Map();
        const loading_overlay = document.getElementById('loading_overlay');
        const loading_progress = document.getElementById('loading_progress');
        const player_ui = document.getElementById('player_ui');

        async function precache_all_tracks() {
            player_ui.classList.add('loading');
            const total = album_data.length;
            let loaded = 0;

            const batch_size = 4;
            for (let i = 0; i < total; i += batch_size) {
                const batch = album_data.slice(i, Math.min(i + batch_size, total));
                await Promise.all(batch.map(async (track) => {
                    try {
                        const resp = await fetch(`audio/${track.id}.wav`);
                        if (resp.ok) {
                            const blob = await resp.blob();
                            audio_cache.set(track.id, URL.createObjectURL(blob));
                        }
                    } catch (e) {}
                    loaded++;
                    loading_progress.textContent = `${loaded}/${total}`;
                }));
            }

            loading_overlay.classList.add('hidden');
            player_ui.classList.remove('loading');
        }

        const export_tier_btn = document.getElementById('export_tier_btn');

        async function export_tierlist_image() {
            const scale = 2;
            const W = 1100;
            const PAD = 40;
            const LABEL_W = 78;
            const GAP = 16;
            const ROW_GAP = 14;
            const PILL_H = 42;
            const PILL_GAP = 10;
            const PILL_PAD_X = 18;
            const ROW_PAD_Y = 14;
            const TOP_PAD = 150;
            const HEADER_H = 150 + TOP_PAD;
            const content_x = PAD + LABEL_W + GAP;
            const content_w = W - content_x - PAD;
            const tiers = ['S', 'A', 'B', 'C', 'D'];
            const tier_colors = { S: '#ff2a6d', A: '#ff7a00', B: '#e5df00', C: '#05d59e', D: '#00e5ff' };

            try { await document.fonts.load('700 16px Inter'); await document.fonts.ready; } catch (e) {}

            const measure = document.createElement('canvas').getContext('2d');
            measure.font = '600 16px Inter, sans-serif';

            const rows = tiers.map(tier => {
                const songs = album_data.filter(t => t.tier === tier);
                const pills = songs.map(t => {
                    const text = `${t.id}. ${display_title(t)}`;
                    const w = measure.measureText(text).width + PILL_PAD_X * 2;
                    return { id_text: `${t.id}.`, title_text: ` ${display_title(t)}`, full: text, w };
                });
                let line = 0, x = 0;
                pills.forEach(p => {
                    if (x > 0 && x + p.w > content_w) { line++; x = 0; }
                    p.lx = x; p.ly = line;
                    x += p.w + PILL_GAP;
                });
                const lines = pills.length ? line + 1 : 1;
                const row_h = ROW_PAD_Y * 2 + lines * PILL_H + (lines - 1) * PILL_GAP;
                return { tier, pills, row_h };
            });

            let total_h = HEADER_H;
            rows.forEach(r => total_h += r.row_h + ROW_GAP);
            total_h += PAD - ROW_GAP;

            const canvas_out = document.createElement('canvas');
            canvas_out.width = W * scale;
            canvas_out.height = total_h * scale;
            const c = canvas_out.getContext('2d');
            c.scale(scale, scale);

            const bg = c.createLinearGradient(0, 0, 0, total_h);
            bg.addColorStop(0, '#0c1116');
            bg.addColorStop(1, '#060809');
            c.fillStyle = bg;
            c.fillRect(0, 0, W, total_h);

            c.textBaseline = 'alphabetic';
            c.fillStyle = '#ffffff';
            c.font = '900 52px Inter, sans-serif';
            c.fillText('volatile', PAD, 78 + TOP_PAD);
            const vw = c.measureText('volatile').width;
            c.fillStyle = '#00E5FF';
            c.font = '700 30px Inter, sans-serif';
            c.fillText('tierlist', PAD + vw + 16, 76 + TOP_PAD);
            c.fillStyle = '#888888';
            c.font = '400 17px Inter, sans-serif';
            c.fillText('20 months of work, made with <3 by hessfire', PAD, 110 + TOP_PAD);

            let y = HEADER_H;
            rows.forEach(r => {
                c.fillStyle = 'rgba(0,0,0,0.3)';
                c.beginPath();
                c.roundRect(PAD, y, W - PAD * 2, r.row_h, 10);
                c.fill();

                c.fillStyle = tier_colors[r.tier];
                c.beginPath();
                c.roundRect(PAD, y, LABEL_W, r.row_h, [10, 0, 0, 10]);
                c.fill();
                c.fillStyle = '#000000';
                c.font = '900 30px Inter, sans-serif';
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.fillText(r.tier, PAD + LABEL_W / 2, y + r.row_h / 2);
                c.textAlign = 'left';

                r.pills.forEach(p => {
                    const px = content_x + p.lx;
                    const py = y + ROW_PAD_Y + p.ly * (PILL_H + PILL_GAP);
                    c.fillStyle = 'rgba(255,255,255,0.06)';
                    c.strokeStyle = 'rgba(255,255,255,0.12)';
                    c.lineWidth = 1;
                    c.beginPath();
                    c.roundRect(px, py, p.w, PILL_H, 8);
                    c.fill();
                    c.stroke();
                    c.textBaseline = 'middle';
                    c.font = '600 16px Inter, sans-serif';
                    c.fillStyle = 'rgba(255,255,255,0.4)';
                    c.fillText(p.id_text, px + PILL_PAD_X, py + PILL_H / 2);
                    const id_w = c.measureText(p.id_text).width;
                    c.fillStyle = '#ffffff';
                    c.fillText(p.title_text, px + PILL_PAD_X + id_w, py + PILL_H / 2);
                });

                y += r.row_h + ROW_GAP;
            });

            const stick = new Image();
            stick.src = 'stickman.png';
            await new Promise(res => { stick.onload = res; stick.onerror = res; });
            if (stick.complete && stick.naturalWidth) {
                const tint = document.createElement('canvas');
                tint.width = stick.naturalWidth;
                tint.height = stick.naturalHeight;
                const tc = tint.getContext('2d');
                tc.drawImage(stick, 0, 0);
                tc.globalCompositeOperation = 'source-in';
                tc.fillStyle = '#ffffff';
                tc.fillRect(0, 0, tint.width, tint.height);

                const draw_w = W;
                const draw_h = draw_w * (stick.naturalHeight / stick.naturalWidth);
                const dx = 0;
                const dy = 0;
                c.globalAlpha = 0.6;
                c.shadowBlur = 25;
                c.shadowColor = 'rgba(0, 229, 255, 0.5)';
                c.drawImage(tint, dx, dy, draw_w, draw_h);
                c.shadowBlur = 0;
                c.globalAlpha = 1;
            }

            canvas_out.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                trigger_download(url, 'hessfire - volatile tierlist.png', true);
            }, 'image/png');
        }
        export_tier_btn.addEventListener('click', export_tierlist_image);

        window.addEventListener('DOMContentLoaded', () => {
            init_tracklist();
            precache_all_tracks();
        });
    </script>
</body>
</html>
